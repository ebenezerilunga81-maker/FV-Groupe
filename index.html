<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trader Vision | Bienvenue</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center;
        }
        .welcome-card {
            background: var(--card); border: 1px solid #30363d; padding: 50px;
            border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 400px;
        }
        .logo-icon { font-size: 4rem; color: var(--accent); margin-bottom: 20px; }
        h1 { margin: 0; font-size: 1.8rem; }
        p { color: #8b949e; margin: 15px 0 30px 0; font-size: 0.95rem; }
        
        .btn-google {
            background: white; color: #1f2328; border: none; padding: 12px 25px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem;
            display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%;
            transition: 0.3s;
        }
        .btn-google:hover { background: #f0f0f0; transform: scale(1.02); }
        .btn-guest {
            margin-top: 20px; display: inline-block; color: var(--accent);
            text-decoration: none; font-size: 0.85rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <div class="logo-icon"><i class="fas fa-chart-line"></i></div>
        <h1>Trader Vision</h1>
        <p>Gérez vos performances, analysez vos setups et progressez chaque jour.</p>
        
        <button onclick="loginGoogle()" class="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Continuer avec Google
        </button>

        <a href="dashboard.html" class="btn-guest">Continuer en tant que visiteur <i class="fas fa-arrow-right"></i></a>
    </div>

    <script>
        // CONFIGURATION CORRIGÉE SELON TA CAPTURE D'ÉCRAN
        const firebaseConfig = {
            apiKey: "AIzaSyBBNDPwfGClAAL4MrUeR64lX2JbEWp9S8U",
            authDomain: "fv-groupe.firebaseapp.com",
            projectId: "fv-groupe",
            storageBucket: "fv-groupe.firebasestorage.app",
            messagingSenderId: "166804121849",
            appId: "1:166804121849:web:fd69360dc40485dd365a28",
            measurementId: "G-NT407JQJN7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        function loginGoogle() {
            auth.signInWithPopup(provider).then((result) => {
                console.log("Connecté :", result.user.displayName);
                window.location.replace("dashboard.html"); // Utilise replace pour éviter le retour arrière
            }).catch(err => {
                console.error("Erreur de connexion :", err.message);
                alert("Erreur : " + err.message);
            });
        }

        // Vérification automatique au chargement
        auth.onAuthStateChanged(user => {
            if (user) {
                window.location.replace("dashboard.html");
            }
        });
    </script>
</body>
</html>
