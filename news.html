<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FV | Actualités Or & USD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg-dark: #0e1117; --sidebar-color: #161b22; --accent-blue: #58a6ff;
            --card-bg: #1c2128; --border-color: #30363d; --text-main: #c9d1d9; --text-dim: #8b949e;
            --error: #da3633;
        }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: var(--text-main); display: flex; }

        /* SIDEBAR UNIFIÉE */
        .sidebar { width: 240px; height: 100vh; background: var(--sidebar-color); border-right: 1px solid var(--border-color); position: fixed; display: flex; flex-direction: column; z-index: 100; }
        .logo { padding: 30px; font-size: 1.5rem; color: var(--accent-blue); font-weight: bold; }
        .nav-links { list-style: none; padding: 0; flex-grow: 1; }
        .nav-links li a { color: var(--text-dim); text-decoration: none; display: flex; align-items: center; gap: 15px; padding: 15px 30px; transition: 0.3s; }
        .nav-links li.active a { background: #21262d; color: var(--accent-blue); border-left: 3px solid var(--accent-blue); }
        .nav-links li a:hover { color: white; background: #1c2128; }

        /* PROFIL EN BAS (L'AVATAR EN BOULE) */
        .auth-section { padding: 20px; border-top: 1px solid var(--border-color); margin-top: auto; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent-blue); object-fit: cover; }
        .user-name { font-size: 0.8rem; font-weight: bold; color: white; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .btn-login { color: var(--accent-blue); text-decoration: none; font-size: 0.8rem; font-weight: bold; }

        /* CONTENU */
        .main-content { margin-left: 240px; flex-grow: 1; padding: 30px; width: calc(100% - 240px); }
        .news-container { background: #1c2128; border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; height: 75vh; overflow: hidden; }

        @media (max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; width: 100%; } }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="logo">FV Groupe</div>
        <ul class="nav-links">
            <li><a href="dashboard.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
            <li class="active"><a href="news.html"><i class="fas fa-newspaper"></i> <span>Actualités</span></a></li>
            <li><a href="journal.html"><i class="fas fa-book"></i> <span>Journal Trading</span></a></li>
        </ul>

        <div class="auth-section">
            <div id="logged-out">
                <a href="#" onclick="loginGoogle()" class="btn-login"><i class="fab fa-google"></i> Connexion</a>
            </div>
            <div id="logged-in" style="display: none;">
                <div class="user-info">
                    <img src="" id="user-photo" class="avatar">
                    <div style="overflow: hidden;">
                        <div id="user-name" class="user-name">Trader</div>
                        <a href="#" onclick="logout()" style="color: var(--error); text-decoration: none; font-size: 0.65rem;">Déconnexion</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header style="margin-bottom: 25px;">
            <h2>Flux Focus : Or (XAU) & Dollar (USD)</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem;">Impact direct sur tes actifs favoris.</p>
        </header>

        <div class="news-container">
            <div class="tradingview-widget-container" style="height: 100%;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                {
                  "feedMode": "manual",
                  "symbols": [
                    { "s": "OANDA:XAUUSD", "d": "Gold / USD" },
                    { "s": "CAPITALCOM:DXY", "d": "US Dollar Index" },
                    { "s": "FX:EURUSD", "d": "Impact USD" }
                  ],
                  "colorTheme": "dark",
                  "isTransparent": true,
                  "displayMode": "regular",
                  "width": "100%",
                  "height": "100%",
                  "locale": "fr"
                }
                </script>
            </div>
        </div>
    </main>

    <script>
        // Remplace par tes clés Firebase
        const firebaseConfig = {apiKey: "AIzaSyBBNDPwfgClAAL4MrUeR64lX2JbEWp9S8U",
  authDomain: "fv-groupe.firebaseapp.com",
  projectId: "fv-groupe",
  storageBucket: "fv-groupe.firebasestorage.app",
  messagingSenderId: "166804121849",
  appId: "1:166804121849:web:fd69360dc40485dd365a28",
  measurementId: "G-NT48ZJ9JN7"};
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const provider = new firebase.auth.GoogleAuthProvider();

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('logged-out').style.display = 'none';
                document.getElementById('logged-in').style.display = 'block';
                document.getElementById('user-photo').src = user.photoURL;
                document.getElementById('user-name').textContent = user.displayName;
            } else {
                document.getElementById('logged-out').style.display = 'block';
                document.getElementById('logged-in').style.display = 'none';
            }
        });

        function loginGoogle() { auth.signInWithPopup(provider); }
        function logout() { auth.signOut(); }
    </script>
</body>
</html>
